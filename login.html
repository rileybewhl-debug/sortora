<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — Sortora</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #F6F9FC; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { background: white; border-radius: 20px; padding: 48px 40px; width: 100%; max-width: 440px; box-shadow: 0 4px 32px rgba(0,0,0,0.08); }
    .logo { font-size: 22px; font-weight: 800; color: #0A2540; margin-bottom: 32px; }
    .logo span { color: #3D63FF; }
    h1 { font-size: 26px; font-weight: 800; color: #0A2540; margin-bottom: 8px; }
    p { color: #8898AA; font-size: 15px; margin-bottom: 32px; }
    .field { margin-bottom: 18px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #0A2540; margin-bottom: 6px; }
    input { width: 100%; padding: 13px 16px; border: 2px solid #E8EDF2; border-radius: 10px; font-size: 15px; font-family: inherit; color: #0A2540; outline: none; transition: border 0.2s; }
    input:focus { border-color: #3D63FF; }
    .btn { width: 100%; padding: 15px; background: #3D63FF; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; font-family: inherit; transition: background 0.2s; margin-top: 8px; }
    .btn:hover { background: #2d52ee; }
    .btn:disabled { background: #8898AA; cursor: not-allowed; }
    .footer-link { text-align: center; margin-top: 24px; font-size: 14px; color: #8898AA; }
    .footer-link a { color: #3D63FF; text-decoration: none; font-weight: 600; }
    .error { background: #FEF2F2; color: #DC2626; padding: 12px 16px; border-radius: 10px; font-size: 14px; margin-bottom: 16px; display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Sort<span>ora</span></div>
    <h1>Welcome back</h1>
    <p>Sign in to your Sortora account.</p>
    <div class="error" id="error-msg"></div>
    <div class="field"><label>Email</label><input type="email" id="email" placeholder="you@email.com" /></div>
    <div class="field"><label>Password</label><input type="password" id="password" placeholder="Your password" /></div>
    <button class="btn" onclick="handleLogin()" id="submit-btn">Sign In</button>
    <div class="footer-link">Don't have an account? <a href="/signup.html">Sign up free</a></div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    var sb = window.supabase.createClient('https://gzwyzocfohtnejttkglg.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6d3l6b2Nmb2h0bmVqdHRrZ2xnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDI0MzI1NzEsImV4cCI6MjA1ODAwODU3MX0.wbMbJxKJHJlXsRSGpGHXPNbhEOQUE2y7rPE4X1NmBHg');
    async function handleLogin() {
      var btn = document.getElementById('submit-btn');
      btn.disabled = true; btn.textContent = 'Signing in...';
      document.getElementById('error-msg').style.display = 'none';
      var email = document.getElementById('email').value.trim();
      var password = document.getElementById('password').value;
      if (!email || !password) {
        document.getElementById('error-msg').textContent = 'Please fill in all fields.';
        document.getElementById('error-msg').style.display = 'block';
        btn.disabled = false; btn.textContent = 'Sign In'; return;
      }
      var result = await sb.auth.signInWithPassword({ email: email, password: password });
      if (result.error) {
        document.getElementById('error-msg').textContent = result.error.message;
        document.getElementById('error-msg').style.display = 'block';
        btn.disabled = false; btn.textContent = 'Sign In'; return;
      }
      var profileResult = await sb.from('profiles').select('role').eq('id', result.data.user.id).single();
      if (profileResult.data && profileResult.data.role === 'provider') {
        window.location.href = '/dashboard.html';
      } else {
        window.location.href = '/browse.html';
      }
    }
  </script>
</body>
</html>
