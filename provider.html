<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Provider — Sortora</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Plus Jakarta Sans',sans-serif;background:#fff;color:#222;min-height:100vh;-webkit-font-smoothing:antialiased}

    /* ── Nav ── */
    .nav{position:sticky;top:0;z-index:50;background:#fff;border-bottom:1px solid #EBEBEB;display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:66px}
    .nav-logo{text-decoration:none;display:flex;align-items:center;gap:8px}
    .logo-text{font-weight:800;font-size:22px;color:#3B6BFF;letter-spacing:-.5px}
    .nav-right{display:flex;align-items:center;gap:8px}
    .nav-link{font-size:14px;font-weight:600;color:#222;text-decoration:none;padding:8px 16px;border-radius:22px;transition:background .15s}
    .nav-link:hover{background:#f7f7f7}
    .nav-btn{font-size:14px;font-weight:700;padding:9px 20px;border-radius:8px;text-decoration:none;cursor:pointer;font-family:inherit;transition:all .15s}
    .nav-btn-outline{background:#fff;color:#222;border:1px solid #b0b0b0}
    .nav-btn-outline:hover{background:#f7f7f7}
    .nav-btn-fill{background:#3B6BFF;color:#fff;border:1px solid #3B6BFF}
    .nav-btn-fill:hover{background:#2d5ae6}

    /* ── Cover ── */
    .cover{width:100%;height:280px;background:#0C1220;background-size:cover;background-position:center;position:relative}
    .cover-gradient{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,rgba(0,0,0,.25) 100%)}

    /* ── Profile Header ── */
    .profile-wrap{max-width:960px;margin:0 auto;padding:0 24px}
    .profile-header{display:flex;gap:24px;align-items:flex-end;margin-top:-48px;position:relative;z-index:2;margin-bottom:24px}
    .profile-avatar{width:120px;height:120px;border-radius:50%;background:#222;border:4px solid #fff;box-shadow:0 4px 16px rgba(0,0,0,.12);display:flex;align-items:center;justify-content:center;font-size:44px;font-weight:800;color:#fff;overflow:hidden;flex-shrink:0}
    .profile-avatar img{width:100%;height:100%;object-fit:cover}
    .profile-header-info{padding-bottom:8px;flex:1;min-width:0}
    .profile-name{font-size:28px;font-weight:800;letter-spacing:-.03em;color:#222;line-height:1.2;margin-bottom:4px}
    .profile-tagline{font-size:15px;color:#6a6a6a;margin-bottom:6px}
    .profile-meta{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
    .profile-meta-item{font-size:14px;color:#6a6a6a;display:flex;align-items:center;gap:5px}
    .profile-meta-item svg{width:15px;height:15px;color:#6a6a6a;flex-shrink:0}
    .profile-meta-item a{color:#222;text-decoration:underline}
    .profile-actions{display:flex;gap:8px;flex-shrink:0;padding-bottom:8px}
    .action-btn{display:flex;align-items:center;gap:6px;font-size:14px;font-weight:600;color:#222;padding:10px 18px;border-radius:8px;border:1px solid #b0b0b0;background:#fff;cursor:pointer;font-family:inherit;transition:all .15s}
    .action-btn:hover{background:#f7f7f7}
    .action-btn svg{width:16px;height:16px}

    .divider{height:1px;background:#EBEBEB;margin:24px 0}

    /* ── Stats Row ── */
    .stats-row{display:flex;gap:32px;flex-wrap:wrap}
    .stat{text-align:center;min-width:80px}
    .stat-num{font-size:22px;font-weight:800;color:#222;line-height:1.2}
    .stat-label{font-size:13px;color:#6a6a6a;margin-top:2px}

    /* ── About ── */
    .about-section{}
    .section-title{font-size:22px;font-weight:800;color:#222;letter-spacing:-.02em;margin-bottom:16px}
    .about-text{font-size:16px;line-height:1.7;color:#222;max-height:120px;overflow:hidden;position:relative;transition:max-height .3s}
    .about-text.expanded{max-height:2000px}
    .about-text::after{content:'';position:absolute;bottom:0;left:0;right:0;height:40px;background:linear-gradient(transparent,#fff);transition:opacity .3s}
    .about-text.expanded::after{opacity:0}
    .about-empty{font-size:16px;color:#b0b0b0;font-style:italic}
    .show-more{display:inline-flex;align-items:center;gap:6px;font-size:15px;font-weight:700;color:#222;text-decoration:underline;cursor:pointer;margin-top:10px;background:none;border:none;font-family:inherit;padding:0}
    .show-more svg{width:14px;height:14px;transition:transform .2s}
    .show-more.expanded svg{transform:rotate(180deg)}

    /* ── Highlights ── */
    .highlights{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .hl-card{display:flex;align-items:flex-start;gap:14px;padding:20px;border:1px solid #EBEBEB;border-radius:12px;transition:border-color .15s}
    .hl-card:hover{border-color:#b0b0b0}
    .hl-icon{width:40px;height:40px;border-radius:10px;background:#f7f7f7;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .hl-icon svg{width:20px;height:20px;color:#222}
    .hl-title{font-size:14px;font-weight:700;color:#222;margin-bottom:2px}
    .hl-desc{font-size:13px;color:#6a6a6a;line-height:1.4}

    /* ── Sessions ── */
    .sessions-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
    .s-card{cursor:pointer;transition:all .2s;border-radius:12px}
    .s-card:hover .s-card-img{transform:scale(1.02)}
    .s-card-img{width:100%;aspect-ratio:16/10;background-size:cover;background-position:center;border-radius:12px;background-color:#0C1220;overflow:hidden;transition:transform .25s;position:relative}
    .s-card-placeholder{width:100%;aspect-ratio:16/10;background:linear-gradient(135deg,#0C1220,#1a2d50);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:2rem;position:relative;transition:transform .25s}
    .s-card-badge{position:absolute;top:10px;left:10px}
    .s-badge{padding:5px 10px;border-radius:6px;font-size:11px;font-weight:700;background:#fff;color:#222;box-shadow:0 2px 4px rgba(0,0,0,.08)}
    .s-card-info{padding:10px 2px 0}
    .s-card-title{font-size:15px;font-weight:700;color:#222;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .s-card-date{font-size:13px;color:#6a6a6a;margin-bottom:2px}
    .s-card-loc{font-size:13px;color:#6a6a6a;margin-bottom:4px}
    .s-card-price{font-size:15px;font-weight:800;color:#222}
    .s-card-price small{font-size:13px;font-weight:400;color:#6a6a6a}
    .s-card-spots{font-size:12px;font-weight:700;color:#d93b30;margin-top:2px}

    .empty-sessions{text-align:center;padding:60px 24px;color:#b0b0b0;border:1px dashed #EBEBEB;border-radius:12px}
    .empty-sessions p{font-size:15px;margin-top:8px}

    /* ── Contact Strip ── */
    .contact-strip{display:flex;align-items:center;justify-content:space-between;padding:24px;background:#f7f7f7;border-radius:12px}
    .contact-text{font-size:15px;color:#222}
    .contact-text strong{font-weight:700}
    .contact-btn{padding:11px 24px;background:#222;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s}
    .contact-btn:hover{background:#000}

    /* ── Not Found ── */
    .not-found{text-align:center;padding:100px 24px}
    .not-found h2{font-size:24px;font-weight:800;color:#222;margin-bottom:8px}
    .not-found p{color:#6a6a6a;margin-bottom:16px}
    .not-found a{color:#3B6BFF;font-weight:700;text-decoration:none}

    /* ── Toast ── */
    .toast{position:fixed;bottom:24px;right:24px;background:#222;color:#fff;padding:12px 20px;border-radius:8px;font-size:14px;font-weight:600;display:none;z-index:99;box-shadow:0 4px 16px rgba(0,0,0,.15)}

    /* ── Mobile ── */
    @media(max-width:768px){
      .cover{height:200px}
      .profile-header{flex-direction:column;align-items:flex-start;gap:16px;margin-top:-40px}
      .profile-avatar{width:96px;height:96px;font-size:36px}
      .profile-name{font-size:24px}
      .profile-actions{width:100%}
      .action-btn{flex:1;justify-content:center}
      .highlights{grid-template-columns:1fr}
      .stats-row{gap:20px}
      .sessions-grid{grid-template-columns:1fr}
      .contact-strip{flex-direction:column;gap:12px;text-align:center}
      .nav{padding:0 16px}
      .profile-wrap{padding:0 16px}
    }

    /* ── Animation ── */
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .profile-header{animation:fadeIn .35s ease both}
    .about-section,.highlights,.sessions-section,.contact-strip{animation:fadeIn .35s ease both}
    .about-section{animation-delay:.05s}
    .highlights{animation-delay:.08s}
    .sessions-section{animation-delay:.12s}
  </style>
</head>
<body>

  <div id="nav-root" data-style="light"></div>

  <div id="page-content">
    <div style="text-align:center;padding:100px;color:#b0b0b0">Loading...</div>
  </div>

  <div class="toast" id="toast">Link copied!</div>

  <script src="/nav.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    async function init() {
      var path = window.location.pathname;
      var slug = path.startsWith('/p/') ? path.split('/p/')[1] : new URLSearchParams(window.location.search).get('slug');
      if (!slug) { showNotFound(); return; }
      slug = slug.replace(/\/+$/, '');

      var r = await fetch('/api/provider-data?slug=' + encodeURIComponent(slug));
      if (!r.ok) { showNotFound(); return; }
      var data = await r.json();
      render(data.provider, data.sessions);
    }

    function render(p, sessions) {
      var name = p.profiles ? p.profiles.full_name : p.business_name;
      var city = p.profiles ? p.profiles.city : p.location;
      var initial = (p.business_name || '?').charAt(0).toUpperCase();
      var shareUrl = 'https://sortora.com/p/' + p.slug;
      var cat = (p.category || 'provider');
      var catLabel = cat.charAt(0).toUpperCase() + cat.slice(1);

      document.title = p.business_name + ' — Sortora';

      var h = '';

      // Cover photo
      if (p.cover_url) {
        h += '<div class="cover" style="background-image:url(' + p.cover_url.split('?')[0] + '?t=1)"><div class="cover-gradient"></div></div>';
      } else {
        h += '<div class="cover" style="background:linear-gradient(135deg,#0C1220,#1a2d50)"><div class="cover-gradient"></div></div>';
      }

      h += '<div class="profile-wrap">';

      // Profile header
      h += '<div class="profile-header">';
      h += '<div class="profile-avatar">';
      if (p.avatar_url) {
        h += '<img src="' + p.avatar_url.split('?')[0] + '?t=1" alt="' + p.business_name + '">';
      } else {
        h += initial;
      }
      h += '</div>';
      h += '<div class="profile-header-info">';
      h += '<div class="profile-name">' + p.business_name + '</div>';
      h += '<div class="profile-tagline">' + catLabel + ' · ' + (city || p.location || 'Location not set') + '</div>';
      h += '<div class="profile-meta">';
      if (p.instagram) {
        h += '<div class="profile-meta-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1.5" fill="currentColor" stroke="none"/></svg><a href="https://instagram.com/' + p.instagram.replace('@','') + '" target="_blank">' + p.instagram + '</a></div>';
      }
      h += '<div class="profile-meta-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>' + sessions.length + ' upcoming session' + (sessions.length !== 1 ? 's' : '') + '</div>';
      h += '</div></div>';

      // Action buttons
      h += '<div class="profile-actions">';
      h += '<button class="action-btn" onclick="shareProfile(\'' + shareUrl + '\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>Share</button>';
      h += '</div>';
      h += '</div>';

      h += '<div class="divider"></div>';

      // Stats
      h += '<div class="stats-row">';
      h += '<div class="stat"><div class="stat-num">' + sessions.length + '</div><div class="stat-label">Sessions</div></div>';
      h += '<div class="stat"><div class="stat-num">' + catLabel + '</div><div class="stat-label">Specialty</div></div>';
      if (city) h += '<div class="stat"><div class="stat-num">' + city + '</div><div class="stat-label">Based in</div></div>';
      h += '</div>';

      h += '<div class="divider"></div>';

      // About
      h += '<div class="about-section">';
      h += '<div class="section-title">About ' + p.business_name + '</div>';
      if (p.bio) {
        h += '<div class="about-text" id="about-text">' + p.bio.replace(/\n/g, '<br>') + '</div>';
        h += '<button class="show-more" id="show-more-btn" onclick="toggleAbout()">Show more <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg></button>';
      } else {
        h += '<div class="about-empty">This provider hasn\'t added a bio yet.</div>';
      }
      h += '</div>';

      h += '<div class="divider"></div>';

      // Highlights
      h += '<div class="highlights">';
      h += '<div class="hl-card"><div class="hl-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div><div><div class="hl-title">Verified provider</div><div class="hl-desc">Identity and credentials verified by Sortora.</div></div></div>';
      if (p.stripe_account_id) {
        h += '<div class="hl-card"><div class="hl-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg></div><div><div class="hl-title">Secure payments</div><div class="hl-desc">Payments processed through Stripe Connect.</div></div></div>';
      }
      h += '<div class="hl-card"><div class="hl-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg></div><div><div class="hl-title">Local to ' + (city || 'your area') + '</div><div class="hl-desc">Based and operating in your community.</div></div></div>';
      h += '<div class="hl-card"><div class="hl-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg></div><div><div class="hl-title">Group-friendly</div><div class="hl-desc">Built for teams, groups, and collective bookings.</div></div></div>';
      h += '</div>';

      h += '<div class="divider"></div>';

      // Sessions
      h += '<div class="sessions-section">';
      h += '<div class="section-title">Upcoming sessions</div>';
      if (!sessions.length) {
        h += '<div class="empty-sessions"><p>No upcoming sessions right now. Check back soon!</p></div>';
      } else {
        h += '<div class="sessions-grid">' + sessions.map(function(s) {
          var d = new Date(s.session_date);
          var dateStr = d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
          var timeStr = d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
          var card = '<div class="s-card" onclick="window.location.href=\'/session.html?id=' + s.id + '\'">';
          if (s.image_url) {
            card += '<div class="s-card-img" style="background-image:url(' + s.image_url + ')">';
          } else {
            card += '<div class="s-card-placeholder">';
          }
          if (s.is_group_funded) card += '<div class="s-card-badge"><span class="s-badge">Group Funded</span></div>';
          card += '</div>';
          card += '<div class="s-card-info">';
          card += '<div class="s-card-title">' + s.title + '</div>';
          card += '<div class="s-card-date">' + dateStr + ' · ' + timeStr;
          if (s.duration_minutes) card += ' · ' + s.duration_minutes + ' min';
          card += '</div>';
          if (s.location) card += '<div class="s-card-loc">' + s.location + '</div>';
          card += '<div class="s-card-price">$' + parseFloat(s.price_per_person).toFixed(0) + ' <small>per person</small></div>';
          card += '</div></div>';
          return card;
        }).join('') + '</div>';
      }
      h += '</div>';

      h += '<div class="divider"></div>';

      // Contact strip
      h += '<div class="contact-strip">';
      h += '<div class="contact-text">Interested in working with <strong>' + p.business_name + '</strong>?</div>';
      if (sessions.length) {
        h += '<button class="contact-btn" onclick="document.querySelector(\'.sessions-section\').scrollIntoView({behavior:\'smooth\'})">View sessions</button>';
      }
      h += '</div>';

      h += '<div style="height:48px"></div>';
      h += '</div>';

      document.getElementById('page-content').innerHTML = h;

      // Check bio height
      setTimeout(function() {
        var aboutEl = document.getElementById('about-text');
        var showBtn = document.getElementById('show-more-btn');
        if (aboutEl && showBtn && aboutEl.scrollHeight <= 120) {
          showBtn.style.display = 'none';
          aboutEl.style.maxHeight = 'none';
          aboutEl.style.overflow = 'visible';
        }
      }, 50);
    }

    function toggleAbout() {
      var el = document.getElementById('about-text');
      var btn = document.getElementById('show-more-btn');
      if (!el || !btn) return;
      var expanded = el.classList.toggle('expanded');
      btn.classList.toggle('expanded', expanded);
      btn.innerHTML = (expanded ? 'Show less' : 'Show more') + ' <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>';
    }

    function shareProfile(url) {
      if (navigator.share) {
        navigator.share({title: document.title, url: url});
      } else {
        navigator.clipboard.writeText(url).then(function() {
          var t = document.getElementById('toast');
          t.style.display = 'block';
          setTimeout(function(){ t.style.display = 'none'; }, 2500);
        });
      }
    }

    function showNotFound() {
      document.getElementById('page-content').innerHTML = '<div class="not-found"><h2>Provider not found</h2><p>This profile doesn\'t exist or may have moved.</p><a href="/browse.html">Browse all sessions →</a></div>';
    }

    init();
  </script>
</body>
</html>
