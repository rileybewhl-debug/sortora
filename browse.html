<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Browse Sessions — Sortora</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --ink:#0C1220;
      --blue:#3B6BFF;
      --blue-light:#6B8EFF;
      --blue-pale:#EEF2FF;
      --gray-50:#F8FAFC;
      --gray-100:#F1F5F9;
      --gray-200:#E2E8F0;
      --gray-300:#CBD5E1;
      --gray-400:#94A3B8;
      --gray-500:#64748B;
      --gray-600:#475569;
      --gray-800:#1E293B;
      --white:#FFFFFF;
      --green:#10B981;
      --green-bg:#ECFDF5;
      --red:#EF4444;
      --red-bg:#FEF2F2;
      --orange:#F59E0B;
      --orange-bg:#FFF7ED;
      --radius-sm:8px;
      --radius-md:12px;
      --radius-lg:16px;
      --radius-xl:20px;
      --radius-full:999px;
      --shadow-sm:0 1px 3px rgba(12,18,32,.06);
      --shadow-md:0 4px 16px rgba(12,18,32,.08);
      --shadow-lg:0 12px 40px rgba(12,18,32,.12);
      --transition:all .25s cubic-bezier(.4,0,.2,1);
    }
    body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--white);min-height:100vh;color:var(--ink);-webkit-font-smoothing:antialiased;padding-bottom:72px}

    /* ── Top Nav ── */
    .nav{position:sticky;top:0;z-index:50;background:var(--white);border-bottom:1px solid var(--gray-200);display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:80px}
    .nav-logo{text-decoration:none;flex-shrink:0;display:flex;align-items:center;gap:8px}
    .logo-mark{display:block;width:36px;height:36px}
    .logo-text{font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:22px;color:#3B6BFF;letter-spacing:-0.5px}

    /* Center Tabs (Airbnb style) */
    .nav-tabs{display:flex;align-items:center;gap:0;position:absolute;left:50%;transform:translateX(-50%)}
    .nav-tab{display:flex;flex-direction:column;align-items:center;gap:4px;padding:12px 28px;text-decoration:none;color:var(--gray-500);border-bottom:3px solid transparent;transition:var(--transition);cursor:pointer;position:relative}
    .nav-tab:hover{color:var(--ink)}
    .nav-tab.active{color:var(--ink);border-bottom-color:var(--ink)}
    .nav-tab-icon{width:28px;height:28px;display:flex;align-items:center;justify-content:center}
    .nav-tab-icon svg{width:24px;height:24px}
    .nav-tab-label{font-size:12px;font-weight:600;letter-spacing:.01em}

    /* Right side */
    .nav-right{display:flex;align-items:center;gap:12px;flex-shrink:0}
    .nav-user{font-size:13px;font-weight:700;color:var(--ink);padding:8px 16px;background:var(--gray-100);border-radius:var(--radius-full)}
    .nav-signout{font-size:13px;font-weight:600;color:var(--gray-400);cursor:pointer;text-decoration:none;padding:8px 12px;border-radius:var(--radius-full);transition:var(--transition)}
    .nav-signout:hover{color:var(--red);background:var(--red-bg)}

    /* ── Search Bar (Airbnb capsule) ── */
    .search-section{border-bottom:1px solid var(--gray-200);padding:16px 24px;background:var(--white)}
    .search-capsule{max-width:720px;margin:0 auto;display:flex;align-items:center;border:1px solid var(--gray-300);border-radius:var(--radius-full);background:var(--white);box-shadow:var(--shadow-sm);transition:var(--transition);overflow:hidden}
    .search-capsule:focus-within{box-shadow:var(--shadow-md);border-color:var(--gray-400)}
    .search-seg{flex:1;display:flex;flex-direction:column;padding:10px 20px;position:relative;cursor:pointer}
    .search-seg:not(:last-child)::after{content:'';position:absolute;right:0;top:12px;bottom:12px;width:1px;background:var(--gray-200)}
    .search-seg-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink)}
    .search-seg input{border:none;outline:none;font-size:13px;font-family:inherit;color:var(--gray-500);background:transparent;padding:0;margin-top:2px;width:100%}
    .search-seg input::placeholder{color:var(--gray-400)}
    .search-go{width:44px;height:44px;border-radius:50%;background:var(--blue);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;margin:4px;flex-shrink:0;transition:var(--transition)}
    .search-go:hover{background:#2d52ee;transform:scale(1.05)}
    .search-go svg{color:var(--white)}

    /* ── Content ── */
    .content{max-width:1280px;margin:0 auto;padding:28px 24px 40px}

    /* Section headers */
    .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;margin-top:8px}
    .section-title{font-size:22px;font-weight:800;color:var(--ink);letter-spacing:-.02em}
    .section-arrow{display:flex;align-items:center;gap:4px;font-size:13px;font-weight:600;color:var(--gray-500);cursor:pointer;text-decoration:none;transition:var(--transition)}
    .section-arrow:hover{color:var(--blue)}
    .section-arrow svg{transition:transform .2s}
    .section-arrow:hover svg{transform:translateX(3px)}
    .results-count{font-size:13px;font-weight:600;color:var(--gray-400);margin-bottom:20px}

    /* ── Session Cards (Airbnb photo-first) ── */
    .sessions-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:24px}
    .session-card{cursor:pointer;transition:var(--transition);border-radius:var(--radius-lg);overflow:visible}
    .session-card:hover .card-img,.session-card:hover .card-img-placeholder{transform:scale(1.02)}

    /* Card Image */
    .card-img{width:100%;aspect-ratio:4/3;background-size:cover;background-position:center;border-radius:var(--radius-lg);position:relative;overflow:hidden;transition:transform .3s ease}
    .card-img-placeholder{width:100%;aspect-ratio:4/3;background:linear-gradient(135deg,var(--ink),#1d2d50);border-radius:var(--radius-lg);display:flex;align-items:center;justify-content:center;font-size:2.4rem;position:relative;overflow:hidden;transition:transform .3s ease}
    .card-badge{position:absolute;top:10px;left:10px;z-index:2}
    .badge{padding:5px 10px;border-radius:var(--radius-sm);font-size:11px;font-weight:700;background:var(--white);color:var(--ink);box-shadow:0 2px 4px rgba(0,0,0,.1)}
    .card-spots{position:absolute;bottom:10px;right:10px;z-index:2}
    .spots-tag{padding:5px 10px;border-radius:var(--radius-sm);font-size:11px;font-weight:700}
    .spots-ok{background:rgba(255,255,255,.92);color:var(--gray-600)}
    .spots-low{background:var(--red);color:var(--white);animation:pulse-spots 2s ease-in-out infinite}
    .spots-full{background:var(--gray-800);color:var(--white)}
    @keyframes pulse-spots{0%,100%{opacity:1}50%{opacity:.75}}

    /* Card Info */
    .card-info{padding:10px 2px 0}
    .card-top-row{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:2px}
    .card-title{font-size:15px;font-weight:700;color:var(--ink);line-height:1.3;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
    .card-provider{font-size:13px;color:var(--gray-500);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .card-provider:hover{color:var(--blue);text-decoration:underline}
    .card-location{font-size:13px;color:var(--gray-400);margin-bottom:2px}
    .card-date{font-size:13px;color:var(--gray-400);margin-bottom:4px}
    .card-price{font-size:15px;font-weight:800;color:var(--ink);letter-spacing:-.01em}
    .card-price small{font-size:13px;font-weight:400;color:var(--gray-500)}
    .card-rating{display:flex;align-items:center;gap:4px;font-size:13px;font-weight:600;color:var(--ink);flex-shrink:0}

    /* ── Empty State ── */
    .empty{text-align:center;padding:80px 24px;color:var(--gray-400)}
    .empty-icon{font-size:48px;margin-bottom:16px;opacity:.5}
    .empty h3{font-size:18px;font-weight:700;color:var(--ink);margin-bottom:8px}
    .empty p{font-size:14px;color:var(--gray-500)}

    /* ── Bottom Nav (Nextdoor style) ── */
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:50;background:var(--white);border-top:1px solid var(--gray-200);display:flex;align-items:center;justify-content:space-around;height:64px;padding-bottom:env(safe-area-inset-bottom)}
    .bottom-tab{display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 16px;text-decoration:none;color:var(--gray-400);transition:var(--transition);cursor:pointer;-webkit-tap-highlight-color:transparent}
    .bottom-tab.active{color:var(--blue)}
    .bottom-tab:hover{color:var(--blue)}
    .bottom-tab svg{width:22px;height:22px}
    .bottom-tab-label{font-size:10px;font-weight:700;letter-spacing:.02em}


    /* ── Desktop: hide bottom nav ── */
    @media(min-width:769px){
      .bottom-nav{display:none}
      body{padding-bottom:0}
    }

    /* ── Mobile ── */
    @media(max-width:768px){
      .nav{height:64px;padding:0 16px}
      .nav-tabs{display:none}
      .nav-right .nav-signout{display:none}
      .search-section{padding:12px 16px}
      .search-capsule{flex-wrap:wrap;border-radius:var(--radius-lg)}
      .search-seg{padding:8px 16px}
      .search-seg::after{display:none}
      .content{padding:20px 16px 32px}
      .sessions-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px}
      .card-img,.card-img-placeholder{aspect-ratio:1/1;border-radius:var(--radius-md)}
      .card-title{font-size:14px}
      .section-title{font-size:18px}
    }
    @media(max-width:380px){
      .sessions-grid{grid-template-columns:1fr 1fr;gap:12px}
      .nav-user{display:none}
    }

    /* ── Fade-in ── */
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .session-card{animation:fadeUp .35s ease both}
    .session-card:nth-child(1){animation-delay:.03s}
    .session-card:nth-child(2){animation-delay:.06s}
    .session-card:nth-child(3){animation-delay:.09s}
    .session-card:nth-child(4){animation-delay:.12s}
    .session-card:nth-child(5){animation-delay:.15s}
    .session-card:nth-child(6){animation-delay:.18s}
    .session-card:nth-child(7){animation-delay:.21s}
    .session-card:nth-child(8){animation-delay:.24s}
  </style>
</head>
<body>

  <!-- ── Top Nav ── -->
  <nav class="nav">
    <a class="nav-logo" href="/">
      <svg class="logo-mark" width="44" height="44" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="11" cy="32" r="6" stroke="#3B6BFF" stroke-width="1.5" fill="none"/>
        <circle cx="33" cy="32" r="6" stroke="#3B6BFF" stroke-width="1.5" fill="none"/>
        <circle cx="22" cy="10" r="6.5" fill="#3B6BFF"/>
        <path d="M11 26 C11 6, 33 6, 33 26" stroke="#3B6BFF" stroke-width="1.4" fill="none" stroke-linecap="round"/>
      </svg>
      <span class="logo-text">Sortora</span>
    </a>
    <div class="nav-tabs">
      <a class="nav-tab active" href="/browse.html">
        <div class="nav-tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div>
        <span class="nav-tab-label">Browse</span>
      </a>
      <a class="nav-tab" href="/bookings.html">
        <div class="nav-tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>
        <span class="nav-tab-label">Bookings</span>
      </a>
      <a class="nav-tab" href="/profile.html">
        <div class="nav-tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
        <span class="nav-tab-label">Profile</span>
      </a>
    </div>
    <div class="nav-right">
      <span class="nav-user" id="user-name"></span>
      <a class="nav-signout" onclick="signOut()">Sign out</a>
    </div>
  </nav>

  <!-- ── Search Bar ── -->
  <div class="search-section">
    <div class="search-capsule">
      <div class="search-seg">
        <div class="search-seg-label">Where</div>
        <input type="text" id="city-search" placeholder="Search city or location" oninput="applyFilters()"/>
      </div>
      <div class="search-seg">
        <div class="search-seg-label">When</div>
        <input type="date" id="date-filter" onchange="applyFilters()" style="color:var(--gray-500)"/>
      </div>
      <button class="search-go" onclick="applyFilters()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
    </div>
  </div>

  <!-- ── Content ── -->
  <div class="content">
    <div class="section-header">
      <div class="section-title" id="section-title">Available sessions</div>
    </div>
    <div class="results-count" id="results-count"></div>
    <div class="sessions-grid" id="sessions-grid">
      <div class="empty"><div class="empty-icon">⏳</div><h3>Loading sessions...</h3></div>
    </div>
  </div>

  <!-- ── Bottom Nav (mobile) ── -->
  <div class="bottom-nav">
    <a class="bottom-tab active" href="/browse.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span class="bottom-tab-label">Search</span>
    </a>
    <a class="bottom-tab" href="/browse.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a4 4 0 00-8 0v2"/></svg>
      <span class="bottom-tab-label">Services</span>
    </a>
    <a class="bottom-tab" href="/bookings.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span class="bottom-tab-label">Bookings</span>
    </a>
    <a class="bottom-tab" href="/">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span class="bottom-tab-label">Home</span>
    </a>
  </div>


  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    var SB = window.supabase.createClient(
      "https://gzwyzocfohtnejttkglg.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6d3l6b2Nmb2h0bmVqdHRrZ2xnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNjkzNDAsImV4cCI6MjA4ODY0NTM0MH0.WTEGzb2zz7UxjpukffbWFLF5Zup2lC65f1H5nQBE_fw"
    );
    var currentUser = null, allSessions = [];

    async function init() {
      var r = await SB.auth.getSession();
      if (!r.data.session) { window.location.href = "/login.html"; return; }
      currentUser = r.data.session.user;
      var pr = await SB.from("profiles").select("full_name,role").eq("id", currentUser.id).single();
      if (pr.data) {
        document.getElementById("user-name").textContent = pr.data.full_name;
        if (pr.data.role === "provider") { window.location.href = "/dashboard.html"; return; }
      }
      await loadSessions();
      var params = new URLSearchParams(window.location.search);
      var target = params.get("session");
      if (target) { window.location.href = '/session.html?id=' + target; return; }
    }

    async function loadSessions() {
      var r = await SB.from("sessions").select("*, providers(business_name, category, slug, avatar_url)").eq("status","open").gte("session_date", new Date().toISOString()).order("session_date",{ascending:true});
      allSessions = r.data || [];
      var goingCounts = {};
      if (allSessions.length) {
        var sessionIds = allSessions.map(function(x){return x.id;});
        var bc = await SB.from("bookings").select("session_id").eq("status","going").in("session_id", sessionIds);
        if (bc.data) bc.data.forEach(function(bk){ goingCounts[bk.session_id] = (goingCounts[bk.session_id]||0)+1; });
      }
      window._goingCounts = goingCounts;
      applyFilters();
    }

    function applyFilters() {
      var cityVal = (document.getElementById("city-search").value || "").toLowerCase().trim();
      var dateVal = document.getElementById("date-filter").value;
      var filtered = allSessions.filter(function(s) {
        var matchCity = !cityVal || (s.location && s.location.toLowerCase().includes(cityVal));
        var matchDate = !dateVal || s.session_date.startsWith(dateVal);
        return matchCity && matchDate;
      });
      // Update section title based on search
      var title = document.getElementById("section-title");
      if (cityVal) {
        title.textContent = "Sessions in " + cityVal.charAt(0).toUpperCase() + cityVal.slice(1);
      } else {
        title.textContent = "Available sessions";
      }
      renderSessions(filtered);
    }

    function renderSessions(sessions) {
      var grid = document.getElementById("sessions-grid");
      var count = document.getElementById("results-count");
      count.textContent = sessions.length + " session" + (sessions.length !== 1 ? "s" : "") + " available";
      if (!sessions.length) {
        grid.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><h3>No sessions found</h3><p>Try a different city or date.</p></div>';
        return;
      }
      grid.innerHTML = sessions.map(function(s) {
        var d = new Date(s.session_date);
        var dateStr = d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
        var timeStr = d.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"});
        var pName = s.providers ? s.providers.business_name : "Provider";
        var pSlug = s.providers ? s.providers.slug : null;
        var cat = s.providers ? s.providers.category : s.category || "";
        var pClick = pSlug ? "event.stopPropagation();window.location.href='/p/" + pSlug + "'" : "event.stopPropagation()";
        var goingCount = window._goingCounts ? (window._goingCounts[s.id]||0) : 0;
        var spotsLeft = s.max_spots ? s.max_spots - goingCount : null;
        var isFull = s.max_spots && goingCount >= s.max_spots;

        var card = '<div class="session-card" onclick="window.location.href=\'/session.html?id=' + s.id + '\'">';

        // Image
        if (s.image_url) {
          card += '<div class="card-img" style="background-image:url(' + s.image_url + ')">';
        } else {
          card += '<div class="card-img-placeholder">';
        }
        // Guest favorite / group badge
        if (s.is_group_funded) {
          card += '<div class="card-badge"><span class="badge">👥 Group Funded</span></div>';
        }
        // Spots
        if (s.max_spots) {
          if (isFull) {
            card += '<div class="card-spots"><span class="spots-tag spots-full">Full</span></div>';
          } else if (spotsLeft !== null && spotsLeft <= 3) {
            card += '<div class="card-spots"><span class="spots-tag spots-low">' + spotsLeft + ' spot' + (spotsLeft!==1?'s':'') + ' left</span></div>';
          }
        }
        card += '</div>';

        // Info (Airbnb style: title, provider, location, date, price)
        card += '<div class="card-info">';
        card += '<div class="card-top-row">';
        card += '<div class="card-title">' + s.title + '</div>';
        card += '</div>';
        card += '<div class="card-provider" onclick="' + pClick + '">' + pName + '</div>';
        if (s.location) card += '<div class="card-location">' + s.location + '</div>';
        card += '<div class="card-date">' + dateStr + ' · ' + timeStr;
        if (s.duration_minutes) card += ' · ' + s.duration_minutes + ' min';
        card += '</div>';
        card += '<div class="card-price">$' + parseFloat(s.price_per_person).toFixed(0) + '<small> per person</small></div>';
        card += '</div></div>';
        return card;
      }).join("");
    }

    async function signOut() { await SB.auth.signOut(); window.location.href="/login.html"; }

    init();
  </script>
</body>
</html>
