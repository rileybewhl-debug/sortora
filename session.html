<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Session — Sortora</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Plus Jakarta Sans',sans-serif;background:#fff;color:#222;min-height:100vh;-webkit-font-smoothing:antialiased}

    /* ── Nav ── */
    .nav{position:sticky;top:0;z-index:50;background:#fff;border-bottom:1px solid #EBEBEB;display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:66px}
    .nav-logo{text-decoration:none;display:flex;align-items:center;gap:8px}
    .logo-text{font-weight:800;font-size:22px;color:#3B6BFF;letter-spacing:-.5px}
    .nav-right{display:flex;align-items:center;gap:6px}
    .nav-link{font-size:14px;font-weight:600;color:#222;text-decoration:none;padding:8px 14px;border-radius:22px;transition:background .15s}
    .nav-link:hover{background:#f7f7f7}

    /* ── Wrapper ── */
    .page-wrap{max-width:1120px;margin:0 auto;padding:0 24px}

    /* ── Title Row ── */
    .title-row{padding:24px 0 12px;display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
    .title-text{font-size:26px;font-weight:800;color:#222;letter-spacing:-.03em;line-height:1.25}
    .title-actions{display:flex;gap:12px;flex-shrink:0;padding-top:4px}
    .title-action{display:flex;align-items:center;gap:6px;font-size:14px;font-weight:600;color:#222;text-decoration:underline;cursor:pointer;padding:6px 10px;border-radius:8px;transition:background .15s}
    .title-action:hover{background:#f7f7f7}
    .title-action svg{width:16px;height:16px}

    /* ── Photo Grid ── */
    .photo-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;border-radius:12px;overflow:hidden;margin-bottom:24px;max-height:420px}
    .photo-main{grid-row:1/3;background-size:cover;background-position:center;min-height:420px;cursor:pointer;transition:opacity .2s;position:relative}
    .photo-main:hover{opacity:.92}
    .photo-side{background-size:cover;background-position:center;cursor:pointer;transition:opacity .2s;min-height:206px}
    .photo-side:hover{opacity:.92}
    .photo-placeholder{background:linear-gradient(135deg,#0C1220 0%,#1a2d50 60%,#253d6b 100%);display:flex;align-items:center;justify-content:center;font-size:3rem;min-height:420px;grid-column:1/-1;border-radius:12px;cursor:default}
    .photo-show-all{position:absolute;bottom:16px;right:16px;background:#fff;color:#222;font-size:13px;font-weight:700;padding:8px 16px;border-radius:8px;border:1px solid #222;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:inherit;transition:all .15s}
    .photo-show-all:hover{transform:scale(1.03)}
    .photo-show-all svg{width:14px;height:14px}

    /* ── Content Layout ── */
    .content-layout{display:flex;gap:0;align-items:flex-start}
    .content-left{flex:1;min-width:0;padding-right:80px;border-right:1px solid #EBEBEB}
    .content-right{width:370px;flex-shrink:0;padding-left:48px;position:relative}

    /* ── Subtitle ── */
    .sub-line{font-size:16px;font-weight:500;color:#222;margin-bottom:4px}
    .stats-line{font-size:14px;color:#6a6a6a;margin-bottom:6px}
    .stats-line span{margin:0 3px}

    .divider{height:1px;background:#EBEBEB;margin:24px 0}

    /* ── Host Row ── */
    .host-row{display:flex;align-items:center;gap:14px;cursor:pointer;transition:opacity .15s}
    .host-row:hover{opacity:.85}
    .host-avatar{width:48px;height:48px;border-radius:50%;background:#222;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff;overflow:hidden;flex-shrink:0}
    .host-avatar img{width:100%;height:100%;object-fit:cover}
    .host-info{}
    .host-name{font-size:16px;font-weight:700;color:#222}
    .host-sub{font-size:14px;color:#6a6a6a}

    /* ── Highlights ── */
    .highlights{}
    .highlight{display:flex;align-items:flex-start;gap:16px;padding:14px 0}
    .highlight-icon{width:28px;height:28px;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:2px}
    .highlight-icon svg{width:24px;height:24px;stroke:#222;stroke-width:1.5}
    .highlight-title{font-size:15px;font-weight:700;color:#222;margin-bottom:2px}
    .highlight-desc{font-size:14px;color:#6a6a6a;line-height:1.4}

    /* ── Description ── */
    .desc-section{}
    .desc-text{font-size:16px;line-height:1.65;color:#222;max-height:150px;overflow:hidden;position:relative;transition:max-height .3s}
    .desc-text.expanded{max-height:none}
    .desc-text::after{content:'';position:absolute;bottom:0;left:0;right:0;height:40px;background:linear-gradient(transparent,#fff);pointer-events:none;transition:opacity .3s}
    .desc-text.expanded::after{opacity:0}
    .desc-empty{font-size:16px;color:#b0b0b0;font-style:italic;line-height:1.65}
    .show-more{display:inline-flex;align-items:center;gap:6px;font-size:15px;font-weight:700;color:#222;text-decoration:underline;cursor:pointer;margin-top:12px;background:none;border:none;font-family:inherit;padding:0}
    .show-more svg{width:14px;height:14px;transition:transform .2s}
    .show-more.expanded svg{transform:rotate(180deg)}

    /* ── Booking Card ── */
    .book-card{position:sticky;top:82px;border:1px solid #EBEBEB;border-radius:12px;padding:24px;box-shadow:0 6px 20px rgba(0,0,0,.08);margin-top:0}
    .book-price{font-size:22px;font-weight:800;color:#222;margin-bottom:2px}
    .book-price small{font-size:16px;font-weight:400;color:#6a6a6a}
    .book-spots{font-size:14px;margin-bottom:20px}
    .book-spots-ok{color:#6a6a6a}
    .book-spots-low{color:#d93b30;font-weight:700}
    .book-spots-full{color:#b0b0b0}

    /* Date/details box */
    .book-fields{border:1px solid #b0b0b0;border-radius:8px;overflow:hidden;margin-bottom:16px}
    .book-field-row{display:grid;grid-template-columns:1fr 1fr}
    .book-field{padding:10px 12px;border-bottom:1px solid #b0b0b0}
    .book-field:first-child{border-right:1px solid #b0b0b0}
    .book-field-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#222}
    .book-field-value{font-size:14px;color:#222;margin-top:1px}
    .book-field-full{grid-column:1/-1;padding:10px 12px;border-bottom:none}

    .book-btn{width:100%;padding:14px;border:none;border-radius:8px;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;transition:all .15s;letter-spacing:-.01em}
    .book-btn-primary{background:linear-gradient(to right,#e61e4d 0%,#e31c5f 50%,#d70466 100%);color:#fff}
    .book-btn-primary:hover{opacity:.9}
    .book-btn-sortora{background:#3B6BFF;color:#fff}
    .book-btn-sortora:hover{background:#2d5ae6}
    .book-btn-free{background:#222;color:#fff}
    .book-btn-free:hover{background:#000}
    .book-btn-waitlist{background:#fff;color:#222;border:2px solid #222}
    .book-btn-waitlist:hover{background:#f7f7f7}
    .book-btn:disabled{background:#ddd;color:#fff;cursor:not-allowed;border:none}
    .book-note{font-size:14px;color:#6a6a6a;text-align:center;margin-top:12px}

    /* Breakdown */
    .book-breakdown{margin-top:20px;padding-top:16px;border-top:1px solid #EBEBEB}
    .bk-row{display:flex;justify-content:space-between;font-size:15px;color:#222;margin-bottom:10px}
    .bk-row a{color:#222}
    .bk-row.total{font-weight:800;padding-top:12px;border-top:1px solid #EBEBEB;margin-top:4px}
    .bk-discount{color:#3B6BFF}

    /* Promo */
    .promo-toggle{font-size:14px;font-weight:600;color:#222;text-decoration:underline;cursor:pointer;margin-top:12px;display:inline-block}
    .promo-area{display:none;margin-top:10px}
    .promo-row{display:flex;gap:8px}
    .promo-input{flex:1;padding:10px 12px;border:1px solid #b0b0b0;border-radius:8px;font-size:14px;font-family:inherit;outline:none}
    .promo-input:focus{border-color:#222}
    .promo-apply{padding:10px 18px;background:#fff;border:2px solid #222;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s}
    .promo-apply:hover{background:#f7f7f7}
    .promo-msg{font-size:13px;margin-top:6px;display:none}

    .success-banner{background:#f0fff4;border:1px solid #c6f6d5;color:#22543d;padding:14px 16px;border-radius:8px;font-size:14px;font-weight:600;margin-bottom:16px;display:none}
    .error-banner{background:#fff5f5;border:1px solid #fed7d7;color:#c53030;padding:14px 16px;border-radius:8px;font-size:14px;font-weight:600;margin-bottom:16px;display:none}

    /* ── Loading ── */
    .loading{text-align:center;padding:140px 24px;color:#b0b0b0}
    .loading h3{font-size:18px;font-weight:700;color:#222;margin-bottom:8px}

    /* ── Mobile Bottom Bar ── */
    .mobile-bar{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #EBEBEB;padding:14px 24px;z-index:50;padding-bottom:calc(14px + env(safe-area-inset-bottom))}
    .mobile-bar-inner{display:flex;align-items:center;justify-content:space-between;gap:16px}
    .mb-price{font-size:16px;font-weight:800;line-height:1.2}
    .mb-price small{font-size:14px;font-weight:400;color:#6a6a6a;display:block}
    .mb-btn{padding:13px 28px;border:none;border-radius:8px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;background:#3B6BFF;color:#fff;transition:all .15s}
    .mb-btn:hover{background:#2d5ae6}

    /* ── Mobile Responsive ── */
    @media(max-width:768px){
      body{padding-bottom:76px}
      .mobile-bar{display:block}
      .page-wrap{padding:0 20px}
      .content-layout{flex-direction:column}
      .content-left{padding-right:0;border-right:none}
      .content-right{width:100%;padding-left:0;display:none}
      .title-text{font-size:22px}
      .title-actions{display:none}
      .photo-grid{grid-template-columns:1fr;max-height:280px}
      .photo-main{min-height:280px}
      .photo-side{display:none}
      .nav{padding:0 20px;height:56px}
    }

    /* ── Animation ── */
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .content-left{animation:fadeIn .35s ease both}
    .book-card{animation:fadeIn .35s ease both;animation-delay:.1s}
  </style>
</head>
<body>

  <div id="nav-root" data-style="light"></div>

  <div id="page-content">
    <div class="loading"><h3>Loading session...</h3></div>
  </div>

  <div class="mobile-bar" id="mobile-bar" style="display:none">
    <div class="mobile-bar-inner">
      <div class="mb-price" id="mb-price"></div>
      <button class="mb-btn" id="mb-btn" onclick="handleBook()">Book</button>
    </div>
  </div>

  <script src="/nav.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    var SB = window.supabase.createClient(
      "https://gzwyzocfohtnejttkglg.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6d3l6b2Nmb2h0bmVqdHRrZ2xnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNjkzNDAsImV4cCI6MjA4ODY0NTM0MH0.WTEGzb2zz7UxjpukffbWFLF5Zup2lC65f1H5nQBE_fw"
    );
    var currentUser = null, session = null, goingCount = 0;
    var appliedPromoId = null, appliedDiscount = 0, promoVisible = false;

    async function init() {
      var r = await SB.auth.getSession();
      if (!r.data.session) { window.location.href = "/login.html"; return; }
      currentUser = r.data.session.user;
      var params = new URLSearchParams(window.location.search);
      var sid = params.get("id");
      if (!sid) { document.getElementById("page-content").innerHTML = '<div class="loading"><h3>Session not found</h3></div>'; return; }
      var sr = await SB.from("sessions").select("*, providers(business_name, category, slug, avatar_url, bio, location, instagram)").eq("id", sid).single();
      if (!sr.data) { document.getElementById("page-content").innerHTML = '<div class="loading"><h3>Session not found</h3></div>'; return; }
      session = sr.data;
      var bc = await SB.from("bookings").select("id").eq("session_id", sid).eq("status", "going");
      goingCount = bc.data ? bc.data.length : 0;
      document.title = session.title + " — Sortora";
      render();
    }

    function render() {
      var s = session;
      var d = new Date(s.session_date);
      var dateLong = d.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"});
      var dateShort = d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
      var timeStr = d.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"});
      var pName = s.providers ? s.providers.business_name : "Provider";
      var pSlug = s.providers ? s.providers.slug : null;
      var pAvatar = s.providers && s.providers.avatar_url ? s.providers.avatar_url.split('?')[0] + '?t=1' : null;
      var pBio = s.providers ? s.providers.bio : "";
      var cat = s.providers ? s.providers.category : s.category || "";
      var catLabel = cat.charAt(0).toUpperCase() + cat.slice(1);
      var pLoc = s.location || (s.providers ? s.providers.location : "") || "";
      var spotsLeft = s.max_spots ? s.max_spots - goingCount : null;
      var isFull = s.max_spots && goingCount >= s.max_spots;
      var price = parseFloat(s.price_per_person);
      var payMode = s.payment_mode || "upfront";

      var h = '<div class="page-wrap">';

      // Title row
      h += '<div class="title-row">';
      h += '<div class="title-text">' + s.title + '</div>';
      h += '<div class="title-actions">';
      h += '<div class="title-action" onclick="shareSession()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg> Share</div>';
      h += '</div></div>';

      // Photo grid
      if (s.image_url) {
        h += '<div class="photo-grid">';
        h += '<div class="photo-main" style="background-image:url(' + s.image_url + ')">';
        h += '</div>';
        h += '<div class="photo-side" style="background-image:url(' + s.image_url + ');filter:brightness(.95)"></div>';
        h += '<div class="photo-side" style="background-image:url(' + s.image_url + ');filter:brightness(.9)"></div>';
        h += '</div>';
      } else {
        h += '<div class="photo-placeholder">📷</div>';
      }

      // Content layout
      h += '<div class="content-layout">';

      // ─── LEFT COLUMN ───
      h += '<div class="content-left">';

      // Subtitle + stats
      h += '<div class="sub-line">' + catLabel + ' session in ' + pLoc + '</div>';
      h += '<div class="stats-line">';
      if (s.max_spots) h += s.max_spots + ' spots<span>·</span>';
      if (s.duration_minutes) h += s.duration_minutes + ' minutes<span>·</span>';
      h += '$' + price.toFixed(0) + ' per person';
      h += '</div>';

      h += '<div class="divider"></div>';

      // Host row
      h += '<div class="host-row" onclick="' + (pSlug ? "window.location.href=\'/p/" + pSlug + "\'" : "") + '">';
      if (pAvatar) {
        h += '<div class="host-avatar"><img src="' + pAvatar + '"></div>';
      } else {
        h += '<div class="host-avatar">' + pName.charAt(0) + '</div>';
      }
      h += '<div class="host-info">';
      h += '<div class="host-name">Hosted by ' + pName + '</div>';
      h += '<div class="host-sub">' + catLabel + ' provider</div>';
      h += '</div></div>';

      h += '<div class="divider"></div>';

      // Highlights
      h += '<div class="highlights">';

      // Date & time highlight
      h += '<div class="highlight">';
      h += '<div class="highlight-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>';
      h += '<div><div class="highlight-title">' + dateLong + '</div>';
      h += '<div class="highlight-desc">' + timeStr;
      if (s.duration_minutes) h += ' · ' + s.duration_minutes + ' minutes';
      h += '</div></div></div>';

      // Location highlight
      if (pLoc) {
        h += '<div class="highlight">';
        h += '<div class="highlight-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg></div>';
        h += '<div><div class="highlight-title">' + pLoc + '</div>';
        h += '<div class="highlight-desc">Check with host for exact meeting point.</div>';
        h += '</div></div>';
      }

      // Group funded highlight
      if (s.is_group_funded) {
        h += '<div class="highlight">';
        h += '<div class="highlight-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg></div>';
        h += '<div><div class="highlight-title">Group funded session</div>';
        h += '<div class="highlight-desc">Everyone chips in — the session unlocks when enough people join.</div>';
        h += '</div></div>';
      }

      // Payment mode highlight
      if (payMode === "later") {
        h += '<div class="highlight">';
        h += '<div class="highlight-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div>';
        h += '<div><div class="highlight-title">Free to register</div>';
        h += '<div class="highlight-desc">No payment required now. Pay the host directly at the session.</div>';
        h += '</div></div>';
      }

      h += '</div>';

      h += '<div class="divider"></div>';

      // Description
      h += '<div class="desc-section">';
      if (s.description) {
        h += '<div class="desc-text" id="desc-text">' + s.description.replace(/\n/g, '<br>') + '</div>';
        h += '<button class="show-more" id="show-more-btn" onclick="toggleDesc()">Show more <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg></button>';
      } else {
        h += '<div class="desc-empty">The host hasn\'t added a description yet.</div>';
      }
      h += '</div>';

      h += '<div class="divider"></div>';

      h += '</div>';

      // ─── RIGHT COLUMN: BOOKING CARD ───
      h += '<div class="content-right">';
      h += '<div class="book-card">';
      h += '<div class="success-banner" id="success-msg"></div>';
      h += '<div class="error-banner" id="error-msg"></div>';

      h += '<div class="book-price">$' + price.toFixed(0) + ' <small>per person</small></div>';

      // Spots
      if (isFull) {
        h += '<div class="book-spots book-spots-full">Session is full</div>';
      } else if (spotsLeft !== null && spotsLeft <= 3) {
        h += '<div class="book-spots book-spots-low">' + spotsLeft + ' spot' + (spotsLeft!==1?'s':'') + ' left</div>';
      } else if (spotsLeft !== null) {
        h += '<div class="book-spots book-spots-ok">' + spotsLeft + ' of ' + s.max_spots + ' spots available</div>';
      } else {
        h += '<div class="book-spots book-spots-ok">Open availability</div>';
      }

      // Fields box
      h += '<div class="book-fields">';
      h += '<div class="book-field-row">';
      h += '<div class="book-field"><div class="book-field-label">Date</div><div class="book-field-value">' + dateShort + '</div></div>';
      h += '<div class="book-field"><div class="book-field-label">Time</div><div class="book-field-value">' + timeStr + '</div></div>';
      h += '</div>';
      h += '<div class="book-field-full"><div class="book-field-label">Guests</div><div class="book-field-value">1 person</div></div>';
      h += '</div>';

      // Book button
      var btnClass = "book-btn ";
      var btnText = "";
      if (isFull) {
        btnClass += "book-btn-waitlist"; btnText = "Join waitlist";
      } else if (payMode === "later") {
        btnClass += "book-btn-free"; btnText = "Register — it's free";
      } else {
        btnClass += "book-btn-sortora"; btnText = "Reserve";
      }
      h += '<button class="' + btnClass + '" id="book-btn" onclick="handleBook()">' + btnText + '</button>';

      if (!isFull) {
        h += '<div class="book-note">You won\'t be charged yet</div>';
      }

      // Breakdown
      h += '<div class="book-breakdown" id="breakdown">';
      h += '<div class="bk-row"><span>$' + price.toFixed(0) + ' x 1 person</span><span>$' + price.toFixed(2) + '</span></div>';
      h += '<div class="bk-row" id="discount-row" style="display:none"><span class="bk-discount">Promo discount</span><span class="bk-discount" id="discount-amount"></span></div>';
      h += '<div class="bk-row total"><span>Total</span><span id="total-amount">$' + price.toFixed(2) + '</span></div>';
      h += '</div>';

      // Promo
      h += '<div class="promo-toggle" onclick="togglePromo()">Have a promo code?</div>';
      h += '<div class="promo-area" id="promo-area">';
      h += '<div class="promo-row"><input class="promo-input" type="text" id="promo-input" placeholder="Enter code"/><button class="promo-apply" onclick="applyPromo()">Apply</button></div>';
      h += '<div class="promo-msg" id="promo-msg"></div>';
      h += '</div>';

      h += '</div>';
      h += '</div>';

      h += '</div>';
      h += '</div>';

      document.getElementById("page-content").innerHTML = h;

      // Check if description needs show more
      var descEl = document.getElementById("desc-text");
      var showBtn = document.getElementById("show-more-btn");
      if (descEl && showBtn && descEl.scrollHeight <= 150) {
        showBtn.style.display = "none";
        descEl.style.maxHeight = "none";
        descEl.style.overflow = "visible";
        var after = descEl.querySelector('::after');
      }

      // Mobile bar
      if (window.innerWidth <= 768) {
        document.getElementById("mobile-bar").style.display = "block";
        document.getElementById("mb-price").innerHTML = '<strong>$' + price.toFixed(0) + '</strong><small>per person</small>';
        var mbtn = document.getElementById("mb-btn");
        if (isFull) { mbtn.textContent = "Join waitlist"; mbtn.style.background = "#222"; }
        else if (payMode === "later") { mbtn.textContent = "Register free"; mbtn.style.background = "#222"; }
        else { mbtn.textContent = "Reserve"; }
      }
    }

    function toggleDesc() {
      var el = document.getElementById("desc-text");
      var btn = document.getElementById("show-more-btn");
      if (!el || !btn) return;
      var expanded = el.classList.toggle("expanded");
      btn.classList.toggle("expanded", expanded);
      btn.innerHTML = (expanded ? "Show less" : "Show more") + ' <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>';
    }

    function togglePromo() {
      promoVisible = !promoVisible;
      var area = document.getElementById("promo-area");
      if (area) area.style.display = promoVisible ? "block" : "none";
    }

    function shareSession() {
      if (navigator.share) {
        navigator.share({title: session.title, url: window.location.href});
      } else {
        navigator.clipboard.writeText(window.location.href).then(function(){alert("Link copied!");});
      }
    }

    async function applyPromo() {
      var code = document.getElementById("promo-input").value.trim();
      var msg = document.getElementById("promo-msg");
      if (!code || !session) return;
      var r = await fetch("/api/validate-promo",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({code:code,sessionId:session.id})});
      var data = await r.json();
      msg.style.display = "block";
      if (data.error) {
        msg.textContent = "Invalid: " + data.error; msg.style.color = "#c53030";
        appliedPromoId = null; appliedDiscount = 0; updateBreakdown();
      } else {
        msg.textContent = data.discount_percent + "% off applied!"; msg.style.color = "#276749";
        appliedPromoId = data.promo_id; appliedDiscount = data.discount_percent; updateBreakdown();
      }
    }

    function updateBreakdown() {
      var price = parseFloat(session.price_per_person);
      var dr = document.getElementById("discount-row");
      var da = document.getElementById("discount-amount");
      var ta = document.getElementById("total-amount");
      if (appliedDiscount > 0) {
        var disc = price * appliedDiscount / 100;
        dr.style.display = "flex";
        da.textContent = "-$" + disc.toFixed(2);
        ta.textContent = "$" + (price - disc).toFixed(2);
      } else {
        dr.style.display = "none";
        ta.textContent = "$" + price.toFixed(2);
      }
    }

    async function handleBook() {
      if (!session || !currentUser) return;
      var btn = document.getElementById("book-btn");
      var mbtn = document.getElementById("mb-btn");
      var isFull = session.max_spots && goingCount >= session.max_spots;
      if (btn) { btn.disabled = true; btn.textContent = "Processing..."; }
      if (mbtn) { mbtn.disabled = true; mbtn.textContent = "..."; }

      if (isFull) {
        try {
          var wr = await fetch("/api/waitlist",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({sessionId:session.id,customerId:currentUser.id})});
          var wd = await wr.json();
          if (wd.success) { showMsg("success","You're on the waitlist! We'll notify you when a spot opens."); setBtn("On waitlist","#222",true); }
          else { showMsg("error",wd.error||"Could not join waitlist."); resetBtn(); }
        } catch(e) { showMsg("error","Something went wrong."); resetBtn(); }
        return;
      }
      var payMode = session.payment_mode || "upfront";
      if (payMode === "later") {
        var rr = await fetch("/api/register-booking",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({sessionId:session.id,customerId:currentUser.id})});
        var rd = await rr.json();
        if (rd.success) { showMsg("success","You're registered! Check your bookings for details."); setBtn("Registered","#222",true); }
        else { showMsg("error",rd.error||"Could not register."); resetBtn(); }
        return;
      }
      var res = await fetch("/api/checkout",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({sessionId:session.id,sessionTitle:session.title,price:session.price_per_person,customerId:currentUser.id,promoId:appliedPromoId,discountPercent:appliedDiscount})});
      var data = await res.json();
      if (data.url) {
        await SB.from("bookings").upsert({session_id:session.id,customer_id:currentUser.id,status:"going"},{onConflict:"session_id,customer_id"});
        window.location.href = data.url;
      } else { showMsg("error",data.error||"Payment failed."); resetBtn(); }
    }

    function showMsg(type, msg) {
      var el = document.getElementById(type === "success" ? "success-msg" : "error-msg");
      if (el) { el.textContent = msg; el.style.display = "block"; }
    }
    function setBtn(text, bg, disabled) {
      var btn = document.getElementById("book-btn");
      var mbtn = document.getElementById("mb-btn");
      if (btn) { btn.textContent = text; btn.style.background = bg; btn.disabled = disabled; btn.style.color = "#fff"; btn.style.border = "none"; }
      if (mbtn) { mbtn.textContent = text; mbtn.style.background = bg; mbtn.disabled = disabled; }
    }
    function resetBtn() {
      var isFull = session.max_spots && goingCount >= session.max_spots;
      var payMode = session.payment_mode || "upfront";
      var btn = document.getElementById("book-btn");
      var mbtn = document.getElementById("mb-btn");
      if (btn) { btn.disabled = false; btn.textContent = isFull ? "Join waitlist" : payMode === "later" ? "Register — it's free" : "Reserve"; }
      if (mbtn) { mbtn.disabled = false; mbtn.textContent = isFull ? "Join waitlist" : payMode === "later" ? "Register free" : "Reserve"; }
    }

    init();
  </script>
</body>
</html>
