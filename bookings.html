<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>My Bookings — Sortora</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Plus Jakarta Sans',sans-serif;background:#fff;color:#0C1220;-webkit-font-smoothing:antialiased;min-height:100vh}

    .page{max-width:860px;margin:0 auto;padding:96px 32px 64px}
    .page-header{margin-bottom:32px}
    .page-title{font-size:28px;font-weight:800;letter-spacing:-.03em;margin-bottom:4px}
    .page-sub{font-size:15px;color:#6a6a6a}

    /* Success banner */
    .success-banner{background:#f0fff4;border:1px solid #c6f6d5;color:#276749;padding:14px 20px;border-radius:12px;font-size:14px;font-weight:600;margin-bottom:20px;display:none;display:flex;align-items:center;gap:8px}
    .success-banner svg{width:18px;height:18px;stroke:#276749;fill:none;stroke-width:2;flex-shrink:0}

    /* Tabs */
    .tabs{display:flex;gap:4px;margin-bottom:24px;background:#f7f8fa;border-radius:10px;padding:4px;width:fit-content}
    .tab{padding:8px 20px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;color:#6a6a6a;transition:all .15s;border:none;background:none;font-family:inherit}
    .tab:hover{color:#0C1220}
    .tab.active{background:#fff;color:#0C1220;box-shadow:0 1px 4px rgba(0,0,0,.06)}

    /* Booking cards */
    .bookings-list{display:flex;flex-direction:column;gap:12px}
    .bk-card{background:#fff;border:1px solid #EBEBEB;border-radius:14px;padding:20px 24px;display:flex;justify-content:space-between;align-items:center;gap:20px;transition:border-color .15s}
    .bk-card:hover{border-color:#d0d0d0}
    .bk-card-left{flex:1;min-width:0}
    .bk-title{font-size:16px;font-weight:800;color:#0C1220;margin-bottom:3px;letter-spacing:-.02em;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .bk-provider{font-size:13px;color:#6a6a6a;margin-bottom:8px}
    .bk-meta{display:flex;gap:14px;flex-wrap:wrap}
    .bk-meta-item{font-size:13px;color:#6a6a6a;display:flex;align-items:center;gap:4px}
    .bk-meta-item svg{width:14px;height:14px;stroke:#b0b0b0;fill:none;stroke-width:2;flex-shrink:0}
    .bk-meta-item span{color:#0C1220;font-weight:600}
    .bk-card-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0}
    .bk-price{font-size:20px;font-weight:800;color:#0C1220}

    /* Badges */
    .badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:8px;font-size:11px;font-weight:700}
    .badge-going{background:rgba(16,185,129,.08);color:#10B981}
    .badge-pending{background:rgba(245,158,11,.08);color:#d97706}
    .badge-out{background:rgba(239,68,68,.06);color:#ef4444}
    .badge-group{background:rgba(59,107,255,.06);color:#3B6BFF}
    .badge-waitlist{background:rgba(245,158,11,.08);color:#d97706}

    /* Pay now button */
    .btn-pay{padding:9px 20px;background:#3B6BFF;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
    .btn-pay:hover{background:#2d5ae6;transform:translateY(-1px);box-shadow:0 3px 10px rgba(59,107,255,.2)}
    .btn-pay:disabled{background:#d0d0d0;cursor:not-allowed;transform:none;box-shadow:none}
    .btn-pay svg{width:14px;height:14px}

    .deadline-note{font-size:11px;color:#d97706;font-weight:600;margin-top:3px}

    /* Leave waitlist */
    .btn-leave{padding:7px 14px;background:#fff;color:#6a6a6a;border:1px solid #EBEBEB;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
    .btn-leave:hover{border-color:#ef4444;color:#ef4444}

    /* Empty state */
    .empty{text-align:center;padding:48px 24px}
    .empty-icon{width:48px;height:48px;border-radius:50%;background:#f7f8fa;display:flex;align-items:center;justify-content:center;margin:0 auto 14px}
    .empty-icon svg{width:22px;height:22px;stroke:#b0b0b0;fill:none;stroke-width:2}
    .empty h3{font-size:16px;font-weight:800;color:#0C1220;margin-bottom:6px}
    .empty p{font-size:14px;color:#6a6a6a}
    .empty a{color:#3B6BFF;font-weight:700;text-decoration:none}
    .empty a:hover{text-decoration:underline}

    /* Section divider */
    .section-divider{border-top:1px solid #f0f0f0;margin-top:40px;padding-top:32px}
    .section-title{font-size:18px;font-weight:800;letter-spacing:-.02em;margin-bottom:4px}
    .section-sub{font-size:14px;color:#6a6a6a;margin-bottom:16px}

    @media(max-width:640px){
      .page{padding:80px 16px 48px}
      .bk-card{flex-direction:column;align-items:flex-start}
      .bk-card-right{align-items:flex-start;width:100%;flex-direction:row;justify-content:space-between}
    }
  </style>
</head>
<body>
  <div id="nav-root" data-style="light"></div>

  <div class="page">
    <div class="page-header">
      <div class="page-title">My Bookings</div>
      <div class="page-sub">Track and manage all your sessions.</div>
    </div>

    <div class="success-banner" id="success-banner" style="display:none">
      <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      Payment successful — you're confirmed!
    </div>

    <div class="tabs">
      <button class="tab active" onclick="filterTab('all', this)">All</button>
      <button class="tab" onclick="filterTab('going', this)">Going</button>
      <button class="tab" onclick="filterTab('registered', this)">Registered</button>
      <button class="tab" onclick="filterTab('out', this)">Cancelled</button>
    </div>

    <div class="bookings-list" id="bookings-list">
      <div class="empty"><div class="empty-icon"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div><h3>Loading...</h3></div>
    </div>

    <div class="section-divider">
      <div class="section-title">Waitlist</div>
      <div class="section-sub">Sessions you're waiting on a spot for.</div>
      <div class="bookings-list" id="waitlist-list">
        <div class="empty"><div class="empty-icon"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div><h3>Loading...</h3></div>
      </div>
    </div>
  </div>

  <script src="/nav.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    var SB = window._sortoraSB || window.supabase.createClient('https://gzwyzocfohtnejttkglg.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6d3l6b2Nmb2h0bmVqdHRrZ2xnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNjkzNDAsImV4cCI6MjA4ODY0NTM0MH0.WTEGzb2zz7UxjpukffbWFLF5Zup2lC65f1H5nQBE_fw'); window._sortoraSB = SB; var _sbDummy;
    var currentUser = null;
    var allBookings = [];
    var currentFilter = 'all';

    async function init() {
      var params = new URLSearchParams(window.location.search);
      if (params.get('payment') === 'success') document.getElementById('success-banner').style.display = 'flex';
      var r = await SB.auth.getSession();
      if (!r.data.session) { window.location.href = '/login.html'; return; }
      currentUser = r.data.session.user;
      var pr = await SB.from('profiles').select('full_name,role').eq('id', currentUser.id).single();
      if (pr.data) {
        if (pr.data.role === 'provider') { window.location.href = '/dashboard.html'; return; }
      }
      loadBookings();
      loadWaitlist();
    }

    async function loadBookings() {
      var r = await SB.from('bookings')
        .select('*, sessions(id, title, session_date, price_per_person, location, duration_minutes, funding_deadline, payment_mode, is_group_funded, providers(business_name))')
        .eq('customer_id', currentUser.id)
        .order('created_at', {ascending: false});
      allBookings = r.data || [];
      renderBookings(allBookings);
    }

    function filterTab(status, btn) {
      currentFilter = status;
      document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
      btn.classList.add('active');
      if (status === 'all') { renderBookings(allBookings); return; }
      var mapped = status === 'registered' ? 'maybe' : status === 'cancelled' ? 'out' : status;
      renderBookings(allBookings.filter(function(b) { return b.status === mapped; }));
    }

    function renderBookings(bookings) {
      var list = document.getElementById('bookings-list');
      if (!bookings.length) {
        list.innerHTML = '<div class="empty"><div class="empty-icon"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M22 17H2a3 3 0 003 3h14a3 3 0 003-3zM6 7v10"/><path d="M18 7v10"/><path d="M6 7h12"/></svg></div><h3>No bookings yet</h3><p>Head to <a href="/browse.html">Browse</a> to find sessions near you.</p></div>';
        return;
      }
      list.innerHTML = bookings.map(function(b) {
        var s = b.sessions;
        if (!s) return '';
        var d = new Date(s.session_date);
        var dateStr = d.toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'});
        var timeStr = d.toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit'});
        var provider = s.providers ? s.providers.business_name : 'Provider';
        var isPaid = b.status === 'going';

        var statusBadge = isPaid
          ? '<span class="badge badge-going">Confirmed</span>'
          : '<span class="badge badge-pending">Payment Due</span>';

        var groupBadge = s.is_group_funded ? '<span class="badge badge-group">Group</span>' : '';

        var payBtn = '';
        if (!isPaid) {
          payBtn = '<button class="btn-pay" onclick="payNow(\'' + b.id + '\',\'' + s.id + '\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>Pay Now</button>';
          if (s.funding_deadline) {
            payBtn += '<div class="deadline-note">Pay before ' + new Date(s.funding_deadline).toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'}) + '</div>';
          }
        }

        return '<div class="bk-card" data-status="' + b.status + '">'
          + '<div class="bk-card-left">'
          + '<div class="bk-title">' + s.title + ' ' + groupBadge + '</div>'
          + '<div class="bk-provider">by ' + provider + '</div>'
          + '<div class="bk-meta">'
          + '<div class="bk-meta-item"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><span>' + dateStr + ' at ' + timeStr + '</span></div>'
          + '<div class="bk-meta-item"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg><span>' + (s.location || 'TBD') + '</span></div>'
          + (s.duration_minutes ? '<div class="bk-meta-item"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><span>' + s.duration_minutes + ' min</span></div>' : '')
          + '</div></div>'
          + '<div class="bk-card-right">'
          + '<div class="bk-price">$' + parseFloat(s.price_per_person).toFixed(0) + '</div>'
          + statusBadge
          + payBtn
          + '</div></div>';
      }).join('');
    }

    async function payNow(bookingId, sessionId) {
      var btn = event.target.closest('.btn-pay');
      btn.textContent = 'Loading...';
      btn.disabled = true;
      var sess = await SB.auth.getSession();
      if (!sess.data.session) { window.location.href = '/login.html'; return; }
      var res = await fetch('/api/checkout', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({sessionId: sessionId, customerId: sess.data.session.user.id, bookingId: bookingId})
      });
      var data = await res.json();
      if (data.url) { window.location.href = data.url; }
      else { alert(data.error || 'Could not start checkout.'); btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>Pay Now'; btn.disabled = false; }
    }

    async function loadWaitlist() {
      var wl = document.getElementById('waitlist-list');
      var r = await SB.from('session_waitlist')
        .select('id, created_at, sessions(id, title, session_date, location, price_per_person, providers(business_name))')
        .eq('customer_id', currentUser.id)
        .order('created_at', {ascending: true});
      if (!r.data || !r.data.length) {
        wl.innerHTML = '<div class="empty"><div class="empty-icon"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div><h3>No waitlist entries</h3><p>When sessions are full, you can join the waitlist from the session page.</p></div>';
        return;
      }
      wl.innerHTML = r.data.map(function(w) {
        var s = w.sessions;
        if (!s) return '';
        var d = new Date(s.session_date);
        var dateStr = d.toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'});
        var timeStr = d.toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit'});
        var provider = s.providers ? s.providers.business_name : 'Provider';
        return '<div class="bk-card">'
          + '<div class="bk-card-left">'
          + '<div class="bk-title">' + s.title + ' <span class="badge badge-waitlist">Waitlisted</span></div>'
          + '<div class="bk-provider">by ' + provider + '</div>'
          + '<div class="bk-meta">'
          + '<div class="bk-meta-item"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><span>' + dateStr + ' at ' + timeStr + '</span></div>'
          + '<div class="bk-meta-item"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg><span>' + (s.location || 'TBD') + '</span></div>'
          + '</div></div>'
          + '<div class="bk-card-right">'
          + '<div class="bk-price">$' + parseFloat(s.price_per_person).toFixed(0) + '</div>'
          + '<button class="btn-leave" onclick="leaveWaitlist(\'' + w.id + '\')">Leave Waitlist</button>'
          + '</div></div>';
      }).join('');
    }

    async function leaveWaitlist(waitlistId) {
      if (!confirm('Leave the waitlist for this session?')) return;
      await SB.from('session_waitlist').delete().eq('id', waitlistId);
      loadWaitlist();
    }

    init();
  </script>
</body>
</html>
